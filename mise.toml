[settings]
lockfile = true
# 直近リリース版は不安定なことがあるため、公開から 7 日未満のバージョンは
# 採用しない（ファジー指定の解決・mise upgrade/lock 時に適用。厳密ピンは対象外）。
minimum_release_age = "7d"

[tools]
node = "24.17.0"
pnpm = "11.13.1"
python = "3.14.6"
shellcheck = "0.11.0"
shfmt = "3.13.1"
pinact = "4.1.0"
actionlint = "1.7.12"
ghalint = "1.5.6"
gitleaks = "8.30.1"
