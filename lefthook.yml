pre-commit:
  parallel: true
  jobs:
    - name: markdownlint
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 --fix {staged_files}
      stage_fixed: true
    - name: shellcheck
      glob: "*.sh"
      run: pnpm exec shellcheck {staged_files}
    - name: shfmt
      glob: "*.sh"
      run: shfmt -w {staged_files}
      stage_fixed: true
    - name: jsonlint
      glob: "*.json"
      run: pnpm exec jsonlint --quiet --continue --no-duplicate-keys {staged_files}
    - name: oxfmt-json
      glob: "*.json"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    - name: js-yaml
      glob: "*.{yml,yaml}"
      run: sh -c 'for f in {staged_files}; do pnpm exec js-yaml "$f" > /dev/null || exit 1; done'
    - name: oxfmt-yaml
      glob: "*.{yml,yaml}"
      # oxfmt は pnpm-lock.yaml を内蔵 ignore するため、これだけが staged だと
      # 対象ゼロで exit 2 になる。lockfile は整形対象外なので除外する。
      exclude:
        - "pnpm-lock.yaml"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    - name: gha-pinact
      glob: ".github/workflows/*.{yml,yaml}"
      run: pinact run {staged_files}
      stage_fixed: true
    - name: gha-lint
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint
    - name: pagination
      glob: "*.{sh,md}"
      run: node scripts/lint-pagination.mjs {staged_files}
    - name: skills-sync
      # Repo-wide drift check (skills/ vs .agents/skills/). Fast and deterministic,
      # so it runs on every commit rather than relying on path-glob matching.
      run: node scripts/check-skills-sync.mjs

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
