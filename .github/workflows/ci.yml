name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Lockfile integrity
        run: pnpm install --frozen-lockfile
      - name: Verify registry signatures
        run: pnpm audit signatures

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      - name: Markdown lint
        run: pnpm exec markdownlint-cli2 "**/*.md"
      - name: Shell lint
        run: find . -name "*.sh" -not -path "*/node_modules/*" -exec pnpm exec shellcheck {} +
      - name: JSON lint
        run: find . -name "*.json" -not -path "*/node_modules/*" -exec pnpm exec jsonlint --quiet --continue --no-duplicate-keys {} +
      - name: YAML lint
        run: |
          while IFS= read -r f; do
            pnpm exec js-yaml "$f" > /dev/null
          done < <(find . \( -name "*.yml" -o -name "*.yaml" \) -not -path "*/node_modules/*" -not -path "*/.git/*")

  actionlint:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pinact run --check
      - run: actionlint
